<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📚 Task Manager Mahasiswa</title>
    <link rel="stylesheet" href="assets/css/main.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script type="text/javascript" src="/eel.js"></script>
</head>
<body>
    <header class="header">
        <div class="container">
            <div class="header-content">
                <div class="logo">
                    <i class="fas fa-graduation-cap"></i>
                    <h1>Task Manager Mahasiswa</h1>
                </div>
                <div class="header-stats">
                    <div class="stat-item">
                        <span class="stat-label">Total Tugas</span>
                        <span class="stat-value" id="totalTasks">0</span>
                    </div>
                    <div class="stat-item">
                        <span class="stat-label">Belum Selesai</span>
                        <span class="stat-value pending" id="pendingTasks">0</span>
                    </div>
                </div>
            </div>
        </div>
    </header>

    <main class="container main-content">
        <section class="add-task-section">
            <button class="btn btn-primary" id="addTaskBtn">
                <i class="fas fa-plus"></i> Tambah Tugas Baru
            </button>
        </section>

        <section class="filter-tabs">
            <button class="tab-btn active" data-status="all">
                <i class="fas fa-list"></i> Semua
            </button>
            <button class="tab-btn" data-status="belum dikerjakan">
                <i class="fas fa-clock"></i> Belum Dikerjakan
            </button>
            <button class="tab-btn" data-status="sedang dikerjakan">
                <i class="fas fa-spinner"></i> Sedang Dikerjakan
            </button>
            <button class="tab-btn" data-status="selesai">
                <i class="fas fa-check-circle"></i> Selesai
            </button>
        </section>

        <section class="tasks-grid" id="tasksGrid">
            <div class="empty-state" id="emptyState">
                <i class="fas fa-inbox"></i>
                <p>Belum ada tugas. Tambahkan tugas pertama kamu!</p>
            </div>
        </section>
    </main>

    <div class="modal" id="taskModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modalTitle">
                    <i class="fas fa-plus-circle"></i> Tambah Tugas Baru
                </h2>
                <button class="close-btn" id="closeModal">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            <form id="taskForm">
                <input type="hidden" id="taskId">
                
                <div class="form-group">
                    <label for="taskName">
                        <i class="fas fa-tasks"></i> Nama Tugas
                    </label>
                    <input type="text" id="taskName" placeholder="Contoh: Tugas UTS Pemrograman Web" required>
                </div>
                <div class="form-group">
                    <label for="courseName">
                        <i class="fas fa-book"></i> Mata Kuliah
                    </label>
                    <input type="text" id="courseName" placeholder="Contoh: Pemrograman Web" required>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="deadline">
                            <i class="fas fa-calendar-alt"></i> Deadline
                        </label>
                        <input type="datetime-local" id="deadline" required>
                    </div>

                    <div class="form-group">
                        <label for="priority">
                            <i class="fas fa-flag"></i> Prioritas
                        </label>
                        <select id="priority">
                            <option value="rendah">Rendah</option>
                            <option value="normal" selected>Normal</option>
                            <option value="tinggi">Tinggi</option>
                        </select>
                    </div>
                </div>

                <div class="form-group">
                    <label for="status">
                        <i class="fas fa-info-circle"></i> Status
                    </label>
                    <select id="status" required>
                        <option value="belum dikerjakan">Belum Dikerjakan</option>
                        <option value="sedang dikerjakan">Sedang Dikerjakan</option>
                        <option value="selesai">Selesai</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="notes">
                        <i class="fas fa-sticky-note"></i> Catatan (Opsional)
                    </label>
                    <textarea id="notes" rows="4" placeholder="Tambahkan catatan atau deskripsi tugas..."></textarea>
                </div>

                <div class="form-actions">
                    <button type="button" class="btn btn-secondary" id="cancelBtn">Batal</button>
                    <button type="submit" class="btn btn-primary">
                        <i class="fas fa-save"></i> Simpan Tugas
                    </button>
                </div>
            </form>
        </div>
    </div>

    <div class="toast" id="toast">
        <i class="fas fa-check-circle"></i>
        <span id="toastMessage">Berhasil!</span>
    </div>
</body>
</html>
